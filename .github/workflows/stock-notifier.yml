name: Quant Alpha Auto-Trade V10

on:
  schedule:
    # Every 15 minutes during Jakarta market hours (09:00-16:00 WIB = 02:00-09:00 UTC)
    # Monday to Friday only
    - cron: '*/15 2-9 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-auto-trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Auto-Trade Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: Persist State Files
        run: |
          git config --local user.email "bot@quant-alpha.auto"
          git config --local user.name "Quant Alpha Bot"
          git add -f active_positions.json portfolio_equity.json trade_history.csv forward_test.csv last_signals.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: update state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"
