name: Stock Notifier

on:
  schedule:
    # 06:00 WIB Senin-Jumat (Setara dengan 23:00 UTC Minggu-Kamis)
    - cron: '0 23 * * 0-4'
    # 09:00, 12:00, 15:00, dan 18:00 WIB Senin-Jumat (Setara 02, 05, 08, 11 UTC)
    - cron: '0 2,5,8,11 * * 1-5'
  workflow_dispatch: # Memungkinkan kita menjalankan ini secara manual jika dibutuhkan

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Mempercepat instalasi dependencies pada run selanjutnya
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Stock Notifier Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
